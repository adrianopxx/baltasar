<!DOCTYPE html>
<html>
<head>
  <title>Membros</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</head>

<body class="bg-light">

<div class="container mt-4">

  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">📋 Membros Cadastrados</h5>
    </div>

    <div class="card-body">

      <button class="btn btn-danger mb-3" onclick="logout()">Sair</button>

      <table id="tabela" class="table table-striped table-hover" style="width:100%">
        <thead class="table-light">
          <tr>
            <th>Foto</th>
            <th>Matrícula</th>
            <th>Nome</th>
            <th>Função</th>
            <th>Lotação</th>
            <th>Ações</th>
          </tr>
        </thead>
      </table>

    </div>
  </div>

</div>

<script>

// 🔐 token
const token = localStorage.getItem('token');

if (!token) {
  window.location.href = 'login.html';
}

$(document).ready(function () {

  $('#tabela').DataTable({
    ajax: {
      url: 'http://localhost:3000/cadastro',
      dataSrc: '',
      beforeSend: function (xhr) {
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      },
      error: function (xhr) {
        if (xhr.status === 401 || xhr.status === 403) {
          alert('Sessão expirada');
          logout();
        }
      }
    },
    columns: [
      {
        data: 'foto',
        render: function (data) {
          return `<img src="${data || 'https://via.placeholder.com/40'}" width="40">`;
        }
      },
      { data: 'matricula' },
      { data: 'nome' },
      {
        data: 'funcao',
        defaultContent: 'Sem função'
      },
      {
        data: 'unidade',
        defaultContent: '-'
      },
      {
        data: null,
        render: function (data) {
          return `<button class="btn btn-sm btn-primary" onclick="ver('${data.matricula}')">Visualizar</button>`;
        }
      }
    ],
    pageLength: 10,
    language: {
      url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json'
    }
  });

});

function logout() {
  localStorage.removeItem('token');
  window.location.href = 'login.html';
}

function ver(id) {
  window.location.href = `membro.html?id=${id}`;
}

</script>

</body>
</html>
